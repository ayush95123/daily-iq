name: Daily Interview Questions

on:
  schedule:
    - cron: '30 2 * * *'  # 08:00 AM IST (UTC+5:30) every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  send-questions:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push sent_log.csv back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily-iq
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Persist sent_log.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_log.csv
          git diff --staged --quiet || git commit -m "chore: update sent_log [skip ci]"
          git push
